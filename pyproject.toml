[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
  ".venv",
  "venv",
  "data",
]

[tool.ruff.lint]
extend-select = ["I"]

[tool.mypy]
python_version = "3.13"
files = ["manage.py", "petscan", "petscan_endpoint", "tests"]
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
no_implicit_optional = true
exclude = ["^43641756/"]
disallow_untyped_defs = true
strict = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
check_untyped_defs = false
disable_error_code = ["attr-defined", "misc", "no-any-return"]

[tool.bandit]
exclude_dirs = [".venv", "venv", "data", "tests"]
skips = ["B101"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "petscan_endpoint.settings"
testpaths = ["tests"]
markers = [
  "smoke: browser-based Playwright smoke tests",
  "e2e: browser-based Playwright end-to-end tests against live PetScan",
  "jshelpers: browser-executed JavaScript helper tests via Playwright",
]
